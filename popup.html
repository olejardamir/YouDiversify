<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>YouDiversify</title>
  <link rel="icon" href="icons/icon32.png" type="image/png">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <main class="player">
    <header class="topbar">
      <div class="brand">
        <img src="icons/icon32.png" alt="YouDiversify" class="logo">
        <div class="track-block">
          <div class="name">YouDiversify</div>
          <div class="track-row">
            <div id="target" class="target">Finding YouTube tab...</div>
            <button id="playPause" class="mini-button" title="Play or pause current YouTube video" aria-label="Play or pause current YouTube video">
              <svg class="play-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M8 5v14l11-7L8 5Z"/></svg>
              <svg class="pause-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M7 5h4v14H7V5Zm6 0h4v14h-4V5Z"/></svg>
            </button>
          </div>
        </div>
      </div>
      <button id="toggle" class="icon-button power" title="Turn extension on or off" aria-label="Turn extension on or off">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M11 2h2v10h-2V2Zm6.5 3.9-1.4 1.4A7 7 0 1 1 7.9 7.3L6.5 5.9a9 9 0 1 0 11 0Z"/></svg>
      </button>
    </header>

    <section class="controls" aria-label="YouTube controls">
      <button id="upvote" class="icon-button" title="Upvote current YouTube video" aria-label="Upvote current YouTube video">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M2 21h4V9H2v12Zm20-11c0-1.1-.9-2-2-2h-6.3l1-4.6.03-.32c0-.41-.17-.79-.44-1.06L13.2 1 6.6 7.6C6.22 7.97 6 8.47 6 9v10c0 1.1.9 2 2 2h9c.83 0 1.54-.5 1.84-1.22l3.02-7.05c.09-.23.14-.47.14-.73v-2Z"/></svg>
      </button>

      <button id="downvote" class="icon-button danger" title="Downvote current YouTube video and skip next" aria-label="Downvote current YouTube video and skip next">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M22 3h-4v12h4V3ZM2 14c0 1.1.9 2 2 2h6.3l-1 4.6-.03.32c0 .41.17.79.44 1.06L10.8 23l6.6-6.6c.38-.37.6-.87.6-1.4V5c0-1.1-.9-2-2-2H7c-.83 0-1.54.5-1.84 1.22L2.14 11.27c-.09.23-.14.47-.14.73v2Z"/></svg>
      </button>

      <button id="skipChannel" class="icon-button danger" title="Block channel" aria-label="Block channel">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.42 0-8-3.58-8-8 0-1.85.63-3.55 1.69-4.9L16.9 18.31C15.55 19.37 13.85 20 12 20zm6.31-3.1L7.1 5.69C8.45 4.63 10.15 4 12 4c4.42 0 8 3.58 8 8 0 1.85-.63 3.55-1.69 4.9z"/></svg>
      </button>

      <button id="skip" class="icon-button primary" title="Skip to next unvisited non-Mix recommendation" aria-label="Skip to next unvisited non-Mix recommendation">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 4v16l10-8L5 4Zm11 0h3v16h-3V4Z"/></svg>
      </button>

      <button id="reset" class="icon-button" title="Reset visited video list" aria-label="Reset visited video list">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 5V2L7 7l5 5V9c2.76 0 5 2.24 5 5a5 5 0 0 1-8.66 3.4l-1.42 1.42A7 7 0 1 0 12 5Z"/></svg>
      </button>
    </section>

    <section id="seekPanel" class="seek-panel">
      <div class="seek-header">
        <span id="currentTime">0:00</span>
        <span id="duration">0:00</span>
      </div>
      <input id="seekSlider" class="seek-slider" type="range" min="0" max="1000" value="0" title="Move through the current video" aria-label="Move through the current video">
      <div class="seek-steps">
        <button id="back10" class="step-button" title="Back 10 seconds" aria-label="Back 10 seconds">−10</button>
        <button id="forward10" class="step-button" title="Forward 10 seconds" aria-label="Forward 10 seconds">+10</button>
      </div>
    </section>

    <div id="status" class="status">Ready</div>
  </main>
  <script src="popup.js"></script>
</body>
</html>
